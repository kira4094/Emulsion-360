name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
    - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Build
      run: cargo build --release
    - uses: actions/upload-artifact@v4
      with:
        name: emulsion-windows
        path: target/release/emulsion.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Build
      run: cargo build --release
    - uses: actions/upload-artifact@v4
      with:
        name: emulsion-macos
        path: target/release/emulsion

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Build
      run: cargo build --release
    - uses: actions/upload-artifact@v4
      with:
        name: emulsion-linux
        path: target/release/emulsion

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        draft: true
        files: |
          emulsion-windows/emulsion.exe
          emulsion-macos/emulsion
          emulsion-linux/emulsion
